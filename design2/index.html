<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f1a;color:#e0e0e0}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:40px 30px;text-align:center;border-bottom:1px solid #2196F3}
.header h1{font-size:2em;color:#2196F3;margin-bottom:10px}
.header p{color:#94a3b8;font-size:1.1em}
.stats{display:flex;justify-content:center;gap:40px;padding:25px;background:#16213e}
.stat{text-align:center}
.stat .num{font-size:2em;font-weight:700;color:#2196F3}
.stat .label{color:#64748b;font-size:0.85em;margin-top:4px}
.container{max-width:1200px;margin:0 auto;padding:30px 20px}
.search-box{margin-bottom:25px}
.search-box input{width:100%;padding:14px 20px;background:#1f2937;border:1px solid #374151;border-radius:12px;color:#e2e8f0;font-size:1em;outline:none;transition:border-color 0.2s}
.search-box input:focus{border-color:#2196F3}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:30px}
.filter-btn{padding:8px 18px;background:#1f2937;border:1px solid #374151;border-radius:20px;color:#94a3b8;font-size:0.85em;cursor:pointer;transition:all 0.2s}
.filter-btn:hover,.filter-btn.active{background:#2196F3;color:#fff;border-color:#2196F3}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.product-card{background:#1f2937;border-radius:16px;padding:24px;border:1px solid #374151;transition:all 0.3s;cursor:pointer;display:block;text-decoration:none;color:inherit}
.product-card:hover{transform:translateY(-4px);border-color:#2196F3;box-shadow:0 8px 30px rgba(33,150,243,0.15)}
.product-card .tag{display:inline-block;padding:4px 10px;background:rgba(33,150,243,0.15);color:#2196F3;border-radius:6px;font-size:0.75em;margin-bottom:12px}
.product-card h3{color:#e2e8f0;font-size:1.1em;margin-bottom:8px}
.product-card p{color:#64748b;font-size:0.85em;line-height:1.5;margin-bottom:16px}
.product-card .footer{display:flex;justify-content:space-between;align-items:center}
.product-card .link-text{color:#2196F3;font-size:0.9em}
.product-card .arrow{color:#2196F3;font-size:1.2em}
.empty-state{text-align:center;padding:60px;color:#64748b}
.empty-state h3{font-size:1.2em;margin-bottom:8px}
.footer-bar{text-align:center;padding:30px;color:#475569;font-size:0.85em;border-top:1px solid #1f2937;margin-top:40px}
</style>

</div>

let currentFilter = 'all';
let searchTerm = '';

function getCategory(name) {
  const cats = {
    '停车':['停车','车海洋'],
    '门禁':['门禁','考勤'],
    '消防':['消防','燃气'],
    '医疗':['医疗','健康','体检','医药','养老','陪护'],
    '农业':['农','牧','渔','畜','禽','猪'],
    '体育':['体育','校园'],
    '快递':['快递','柜','柜'],
    '工业':['工业','制造','MES','FLEXIS','Fthings'],
    '能源':['能源','水务','光能','燃气'],
    '城市':['路灯','公厕','保洁','城市']
  };
  for(let c in cats){
    if(cats[c].some(k=>name.includes(k))) return c;
  }
  return '其他';
}

function renderProducts() {
  const grid = document.getElementById('productGrid');
  const empty = document.getElementById('emptyState');
  const filtered = products.filter(p=>{
    const matchSearch = searchTerm==='' || p.name.includes(searchTerm) || p.desc.includes(searchTerm);
    const matchFilter = currentFilter==='all' || getCategory(p.name)===currentFilter;
    return matchSearch && matchFilter;
  });
  if(filtered.length===0){
    grid.innerHTML='';
    empty.style.display='block';
    return;
  }
  empty.style.display='none';
  grid.innerHTML=filtered.map(p=>`
    <a href="${p.file}" class="product-card">
      <span class="tag">${p.tag}</span>
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <div class="footer">
        <span class="link-text">查看设计稿 →</span>
        <span class="arrow">›</span>
      </div>
    </a>
  `).join('');
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderProducts();
}

function filterProducts(){
  searchTerm=document.getElementById('searchInput').value.trim();
  renderProducts();
}

renderProducts();
</script>
</body>
</html>
